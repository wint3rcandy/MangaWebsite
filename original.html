<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Rankings</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">

    <div class="top-bar">
      <div class="top-bar-left">
        <a class="top-logo-link" href="/" aria-label="Go to manga home">
          <div class="top-logo">
            <span class="top-logo-icon" aria-hidden="true">&#127884;</span>
            <div class="top-logo-text">
              <span class="top-title">Manga</span>
              <span class="top-subtitle">Rankings</span>
            </div>
            <span class="stat top-entry-count" id="entry-count">0 entries</span>
          </div>
        </a>
      </div>

      <div class="top-bar-center">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="#555" stroke-width="1.5"/>
            <path d="M13 13L17 17" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input class="search-box" type="text" placeholder="Search titles..." id="search" oninput="handleSearchInput()" onfocus="showSearchClear()" onblur="hideSearchClear()" autocomplete="off">
          <button class="search-clear" id="search-clear" type="button" onclick="clearSearch()" onmousedown="event.preventDefault()" aria-label="Clear search" hidden>&times;</button>
        </div>
      </div>

      <div class="top-bar-right">
        <button class="add-toggle" type="button" onclick="toggleForm()" aria-expanded="false" aria-controls="add-form">
          <span class="toggle-btn" id="toggle-btn">+</span>
          <span>Add Entry</span>
        </button>
        <div class="sort-wrap" id="sort-wrap">
          <button class="sort-trigger" id="sort-trigger" type="button" onclick="toggleSortMenu()" aria-haspopup="true" aria-expanded="false" aria-controls="sort-menu">
            <svg class="sort-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 4h12M4 8h8M6 12h4" stroke="#888" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <span class="sort-trigger-label">Filter</span>
            <span class="sort-trigger-caret" aria-hidden="true">&#9662;</span>
          </button>
          <div class="sort-menu" id="sort-menu" hidden>
            <div class="sort-menu-content">
              <div class="sort-menu-options">
                <button class="sort-option" type="button" data-sort-key="default" onclick="selectSortOption('default')">
                  <span>Default</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="tiered" onclick="selectSortOption('tiered')">
                  <span>Tiered</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="year" onclick="selectSortOption('year')">
                  <span>Year</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="created" onclick="selectSortOption('created')">
                  <span>Added</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="status-finished" onclick="selectSortOption('status-finished')">
                  <span>Finished</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="status-reading" onclick="selectSortOption('status-reading')">
                  <span>Reading</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="status-want-to-read" onclick="selectSortOption('status-want-to-read')">
                  <span>Want to Read</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="status-hiatus" onclick="selectSortOption('status-hiatus')">
                  <span>Hiatus</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="status-cancelled" onclick="selectSortOption('status-cancelled')">
                  <span>Cancelled</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
                <button class="sort-option" type="button" data-sort-key="nsfw" onclick="selectSortOption('nsfw')">
                  <span>NSFW</span>
                  <span class="sort-option-arrow" aria-hidden="true"></span>
                </button>
              </div>
              <div class="sort-menu-side">
                <span class="sort-menu-side-label">Visibility</span>
                <button class="nsfw-toggle sort-menu-nsfw-toggle" type="button" id="nsfw-toggle" onclick="toggleNsfwFilter()" aria-pressed="false">
                  Hide NSFW
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="add-panel" id="add-panel">
      <div class="add-form" id="add-form">
        <div class="field field-title">
          <label>TITLE</label>
          <input type="text" id="f-title" placeholder="Enter manga title">
        </div>

        <div class="field">
          <label>TIER</label>
          <select id="f-score">
            <option value="">-- Ungraded --</option>
            <option value="S+">S+</option>
            <option value="S">S</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="F">F</option>
          </select>
        </div>

        <div class="field">
          <label>STATUS</label>
          <select id="f-status">
            <option>Want to Read</option>
            <option>Reading</option>
            <option>Finished</option>
            <option>Hiatus</option>
            <option>Cancelled</option>
          </select>
        </div>

        <div class="field">
          <label>CHAPTER</label>
          <input type="number" id="f-ch" placeholder="0">
        </div>

        <div class="field">
          <label>STARTED READING</label>
          <input type="text" id="f-year" placeholder="YYYY or MM/DD/YYYY">
        </div>

        <div class="field">
          <label>POSTER (optional, auto-fetch if blank)</label>
          <input type="file" id="f-image" accept="image/*">
        </div>

        <div class="field field-note">
          <label>NOTE / REVIEW</label>
          <input type="text" id="f-note" placeholder="Optional note">
        </div>

        <div class="field field-flag">
          <label>CONTENT FLAG</label>
          <label class="check-chip" for="f-nsfw">
            <input type="checkbox" id="f-nsfw">
            <span>NSFW</span>
          </label>
        </div>

        <button class="add-btn" id="add-submit-btn" type="button" onclick="addEntry()">Add Entry</button>

        <div class="add-progress" id="add-progress" hidden aria-live="polite">
          <div class="add-progress-head">
            <span class="add-progress-label" id="add-progress-label">Preparing entry...</span>
            <span class="add-progress-value" id="add-progress-value">0%</span>
          </div>
          <div class="add-progress-track" aria-hidden="true">
            <div class="add-progress-fill" id="add-progress-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="tiers"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
