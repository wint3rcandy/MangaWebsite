<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">

    <div class="top-bar">
      <div class="top-bar-left">
        <div class="top-logo">
          <span class="top-logo-icon" aria-hidden="true">&#127884;</span>
          <div class="top-logo-text">
            <span class="top-title">Manga</span>
            <span class="top-subtitle">Rankings</span>
          </div>
          <span class="stat top-entry-count" id="entry-count">0 entries</span>
        </div>
      </div>

      <div class="top-bar-center">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="#555" stroke-width="1.5"/>
            <path d="M13 13L17 17" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input class="search-box" type="text" placeholder="Search titles..." id="search" oninput="handleSearchInput()" onfocus="showSearchClear()" onblur="hideSearchClear()" autocomplete="off">
          <button class="search-clear" id="search-clear" type="button" onclick="clearSearch()" onmousedown="event.preventDefault()" aria-label="Clear search" hidden>&times;</button>
        </div>
      </div>

      <div class="top-bar-right">
        <div class="sort-wrap">
          <svg class="sort-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 4h12M4 8h8M6 12h4" stroke="#888" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <select id="sortSelect">
            <option value="default">Default</option>
            <option value="year-desc">Year (Newest)</option>
            <option value="year-asc">Year (Oldest)</option>
            <option value="created-desc">Added (Newest)</option>
            <option value="created-asc">Added (Oldest)</option>
            <option value="score-desc">Score (High)</option>
            <option value="score-asc">Score (Low)</option>
          </select>
        </div>
        <button class="nsfw-toggle" type="button" id="nsfw-toggle" onclick="toggleNsfwFilter()" aria-pressed="false">
          Hide NSFW
        </button>
        <button class="add-toggle" type="button" onclick="toggleForm()" aria-expanded="false" aria-controls="add-form">
          <span>Add new entry</span>
          <span class="toggle-btn" id="toggle-btn">+</span>
        </button>
      </div>
    </div>

    <div class="add-panel" id="add-panel">
      <div class="add-form" id="add-form">

        <div class="field field-title">
          <label>TITLE</label>
          <input type="text" id="f-title">
        </div>

        <div class="field field-score">
          <label>SCORE</label>
          <input type="number" id="f-score" min="0" max="100" step="0.1">
        </div>

        <div class="field field-status">
          <label>STATUS</label>
          <select id="f-status">
            <option>Ongoing</option>
            <option>Finished</option>
            <option>Hiatus</option>
          </select>
        </div>

        <div class="field field-ch">
          <label>CHAPTER</label>
          <input type="number" id="f-ch">
        </div>

        <div class="field field-year">
          <label>STARTED READING</label>
          <input type="text" id="f-year" placeholder="e.g. 2019 or 02/22/2024">
        </div>

        <!-- ðŸ”¥ IMAGE UPLOAD -->
        <div class="field field-image">
          <label>IMAGE</label>
          <input type="file" id="f-image" accept="image/*">
        </div>

        <div class="field field-note">
          <label>NOTE / REVIEW</label>
          <input type="text" id="f-note" placeholder="Optional review...">
        </div>

        <div class="field field-flag">
          <label>CONTENT FLAG</label>
          <label class="check-chip" for="f-nsfw">
            <input type="checkbox" id="f-nsfw">
            <span>NSFW</span>
          </label>
        </div>
        

        <button class="add-btn" onclick="addEntry()">Add â†’</button>
      </div>
    </div>

    <div id="tiers"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
