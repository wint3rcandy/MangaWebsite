<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Rankings</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">

    <div class="top-bar">
      <div class="top-bar-left">
        <a class="top-logo-link" href="/" aria-label="Go to manga home">
          <div class="top-logo">
            <span class="top-logo-icon" aria-hidden="true">&#127884;</span>
            <div class="top-logo-text">
              <span class="top-title">Manga</span>
              <span class="top-subtitle">Rankings</span>
            </div>
            <span class="stat top-entry-count" id="entry-count">0 entries</span>
          </div>
        </a>
      </div>

      <div class="top-bar-center">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="#555" stroke-width="1.5"/>
            <path d="M13 13L17 17" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input class="search-box" type="text" placeholder="Search titles..." id="search" oninput="handleSearchInput()" onfocus="showSearchClear()" onblur="hideSearchClear()" autocomplete="off">
          <button class="search-clear" id="search-clear" type="button" onclick="clearSearch()" onmousedown="event.preventDefault()" aria-label="Clear search" hidden>&times;</button>
        </div>
      </div>

      <div class="top-bar-right">
        <a class="nav-link-btn" href="/">Home</a>
        <div class="sort-wrap" id="sort-wrap">
          <button class="sort-trigger" id="sort-trigger" type="button" onclick="toggleSortMenu()" aria-haspopup="true" aria-expanded="false" aria-controls="sort-menu">
            <svg class="sort-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 4h12M4 8h8M6 12h4" stroke="#888" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <span id="sort-current-label">Default</span>
            <span class="sort-current-icon" id="sort-current-icon" aria-hidden="true"></span>
          </button>
          <div class="sort-menu" id="sort-menu" hidden>
            <button class="sort-option" type="button" data-sort-key="default" onclick="selectSortOption('default')">
              <span>Default</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
            <button class="sort-option" type="button" data-sort-key="year" onclick="selectSortOption('year')">
              <span>Year</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
            <button class="sort-option" type="button" data-sort-key="created" onclick="selectSortOption('created')">
              <span>Added</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
            <button class="sort-option" type="button" data-sort-key="score" onclick="selectSortOption('score')">
              <span>Tier</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
            <button class="sort-option" type="button" data-sort-key="status-finished" onclick="selectSortOption('status-finished')">
              <span>Finished</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
            <button class="sort-option" type="button" data-sort-key="status-ongoing" onclick="selectSortOption('status-ongoing')">
              <span>Ongoing</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
            <button class="sort-option" type="button" data-sort-key="status-hiatus" onclick="selectSortOption('status-hiatus')">
              <span>Hiatus</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
            <button class="sort-option" type="button" data-sort-key="status-cancelled" onclick="selectSortOption('status-cancelled')">
              <span>Cancelled</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
            <button class="sort-option" type="button" data-sort-key="nsfw" onclick="selectSortOption('nsfw')">
              <span>NSFW</span>
              <span class="sort-option-arrow" aria-hidden="true"></span>
            </button>
          </div>
        </div>
        <button class="nsfw-toggle" type="button" id="nsfw-toggle" onclick="toggleNsfwFilter()" aria-pressed="false">
          Hide NSFW
        </button>
      </div>
    </div>

    <div id="tiers"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
