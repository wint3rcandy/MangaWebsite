<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
  <div class="wrap home-wrap">
    <div class="top-bar home-top-bar">
      <div class="top-bar-left">
        <a class="top-logo-link" href="/" aria-label="Go to manga home">
          <div class="top-logo">
            <span class="top-logo-icon" aria-hidden="true">&#127884;</span>
            <div class="top-logo-text">
              <span class="top-title">Manga</span>
              <span class="top-subtitle">Reader Library</span>
            </div>
            <span class="stat top-entry-count" id="home-entry-count">0 ready</span>
          </div>
        </a>
      </div>

      <div class="top-bar-center">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="#555" stroke-width="1.5"/>
            <path d="M13 13L17 17" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input class="search-box" type="text" placeholder="Search library and backlog..." id="home-search" oninput="handleHomeSearch()" autocomplete="off">
          <button class="search-clear" id="home-search-clear" type="button" onclick="clearHomeSearch()" aria-label="Clear search" hidden>&times;</button>
        </div>
      </div>

      <div class="top-bar-right">
        <button class="add-toggle" type="button" onclick="toggleForm()" aria-expanded="false" aria-controls="add-form">
          <span class="toggle-btn" id="toggle-btn">+</span>
          <span>Add Entry</span>
        </button>
        <button class="nsfw-toggle" type="button" id="home-nsfw-toggle" onclick="toggleHomeNsfw()" aria-pressed="false">
          Hide NSFW
        </button>
        <a class="nav-link-btn nav-link-btn-primary" href="/rankings">Open Rankings</a>
      </div>
    </div>

    <div class="add-panel" id="add-panel">
      <div class="add-form" id="add-form">
        <div class="field field-title">
          <label>TITLE</label>
          <input type="text" id="f-title" placeholder="Enter manga title">
        </div>

        <div class="field">
          <label>TIER</label>
          <select id="f-score">
            <option value="">-- Ungraded --</option>
            <option value="S+">S+</option>
            <option value="S">S</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="F">F</option>
          </select>
        </div>

        <div class="field">
          <label>STATUS</label>
          <select id="f-status">
            <option>Want to Read</option>
            <option>Reading</option>
            <option>Finished</option>
            <option>Hiatus</option>
            <option>Cancelled</option>
          </select>
        </div>

        <div class="field">
          <label>CHAPTER</label>
          <input type="number" id="f-ch" placeholder="0">
        </div>

        <div class="field">
          <label>STARTED READING</label>
          <input type="text" id="f-year" placeholder="YYYY or MM/DD/YYYY">
        </div>

        <div class="field">
          <label>POSTER (optional, auto-fetch if blank)</label>
          <input type="file" id="f-image" accept="image/*">
        </div>

        <div class="field field-note">
          <label>NOTE / REVIEW</label>
          <input type="text" id="f-note" placeholder="Optional note">
        </div>

        <div class="field field-flag">
          <label>CONTENT FLAG</label>
          <label class="check-chip" for="f-nsfw">
            <input type="checkbox" id="f-nsfw">
            <span>NSFW</span>
          </label>
        </div>

        <button class="add-btn" id="add-submit-btn" type="button" onclick="addEntry()">Add Entry</button>

        <div class="add-progress" id="add-progress" hidden aria-live="polite">
          <div class="add-progress-head">
            <span class="add-progress-label" id="add-progress-label">Preparing entry...</span>
            <span class="add-progress-value" id="add-progress-value">0%</span>
          </div>
          <div class="add-progress-track" aria-hidden="true">
            <div class="add-progress-fill" id="add-progress-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <section class="home-section home-library-section" id="reader-library">
      <div class="entry-grid home-library-grid" id="home-library-grid">
        <div class="empty-state">Loading your reader library...</div>
      </div>
    </section>

    <section class="home-section home-unread-section" id="unread-library">
      <div class="home-section-head">
        <div>
          <span class="home-section-kicker">Backlog</span>
          <h2 class="home-section-title">Haven't Read Yet</h2>
          <p class="home-section-copy" id="home-unread-copy">Loading your unread manga...</p>
        </div>
      </div>

      <div class="entry-grid home-unread-grid" id="home-unread-grid">
        <div class="empty-state home-empty-state">Loading your unread manga...</div>
      </div>
    </section>
  </div>

  <script src="home.js"></script>
</body>
</html>
